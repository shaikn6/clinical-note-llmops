version: "3.9"

services:
  api:
    build: .
    container_name: clinical-llmops-api
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=true
      - MOCK_S3=true
      - DATABASE_URL=sqlite:///./clinical_llmops.db
      - S3_AUDIT_BUCKET=hipaa-audit-logs
      # Uncomment for live OpenAI:
      # - MOCK_MODE=false
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./data:/app/data:ro
      - db_data:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build: .
    container_name: clinical-llmops-dashboard
    ports:
      - "8501:8501"
    environment:
      - MOCK_MODE=true
      - MOCK_S3=true
      - DATABASE_URL=sqlite:///./clinical_llmops.db
    volumes:
      - ./data:/app/data:ro
      - db_data:/app
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
    driver: local
